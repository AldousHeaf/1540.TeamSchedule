<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <title>1540 Horaire</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <h1>1540</h1>
            <span>Horaire</span>
            <input type="search" id="searchInput" class="search-input" placeholder="Rechercher par nom…" aria-label="Rechercher par nom">
            <button type="button" id="regenerateBtn" class="regenerate-btn">Régénérer</button>
        </div>
    </header>

    <div id="rolePanel" class="role-panel hidden" aria-hidden="true">
        <div class="role-panel-inner">
            <button type="button" class="role-panel-close" aria-label="Fermer"><span aria-hidden="true">×</span></button>
            <div class="role-panel-header">
                <h2 id="rolePanelTitle" class="role-panel-title"></h2>
            </div>
            <div id="rolePanelBody" class="role-panel-body"></div>
        </div>
    </div>

    <main class="main">
        <div id="scheduleContainer" class="schedule-wrap"></div>
    </main>

    <script src="schedule.js?v=2"></script>
</body>
</html>
